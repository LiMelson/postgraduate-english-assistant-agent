services:
  - type: web
    name: postgraduate-english-assistant
    env: python
    region: oregon
    buildCommand: |
      pip install -r requirements.txt
      cd frontend && npm install && npm run build
    startCommand: ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 18.0.0
    healthCheckPath: /api/health
    autoDeploy: true